name: Deploy Pages

# Build & deploy the static site via GitHub Actions (more reliable than the
# legacy Jekyll auto-build). Triggers on manual pushes to main, after each
# crawl run commits fresh data, and manual dispatch.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["crawl-tiktok-qrevo"]   # deploy after the daily crawl commits
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
